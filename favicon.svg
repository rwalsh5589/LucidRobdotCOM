  <!-- Rays from eye -->
  <line x1="50" y1="44" x2="50" y2="38" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="60" y1="47" x2="65" y2="43" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="40" y1="47" x2="35" y2="43" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="64" y1="58" x2="70" y2="58" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="36" y1="58" x2="30" y2="58" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="60" y1="68" x2="65" y2="72" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="40" y1="68" x2="35" y2="72" stroke="#c9a84c" stroke-width="1.5"/>
</svg>
