  <polygon points="50,8 95,88 5,88" fill="none" stroke="#c9a84c" stroke-width="3.5"/>
  <!-- Eye whites -->
  <ellipse cx="50" cy="58" rx="14" ry="9" fill="#c9a84c"/>
