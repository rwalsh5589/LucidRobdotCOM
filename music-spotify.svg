<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <pattern id="sl" x="0" y="0" width="600" height="4" patternUnits="userSpaceOnUse">
      <rect width="600" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#080810"/>
  <rect width="600" height="300" fill="url(#sl)"/>

  <!-- Border -->
  <rect width="600" height="300" fill="none" stroke="#1DB954" stroke-width="1.5" opacity="0.45"/>
  <!-- Corner notches -->
  <path d="M0,20 L20,0" stroke="#1DB954" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M580,0 L600,20" stroke="#1DB954" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M0,280 L20,300" stroke="#1DB954" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M580,300 L600,280" stroke="#1DB954" stroke-width="1.5" fill="none" opacity="0.85"/>

  <!-- ILLUMINATI PYRAMID (right side, semi-transparent) -->
  <g opacity="0.13" stroke="#1DB954" fill="#1DB954">
    <polygon points="440,22 625,278 255,278" fill="none" stroke-width="2.5"/>
    <ellipse cx="440" cy="178" rx="54" ry="34"/>
    <circle cx="440" cy="178" r="22" fill="#080810"/>
    <circle cx="440" cy="178" r="10" fill="#1DB954"/>
    <circle cx="440" cy="178" r="4" fill="#080810"/>
    <!-- Rays -->
    <line x1="440" y1="138" x2="440" y2="120" stroke-width="1.5"/>
    <line x1="471" y1="148" x2="486" y2="133" stroke-width="1.5"/>
    <line x1="495" y1="178" x2="514" y2="178" stroke-width="1.5"/>
    <line x1="471" y1="208" x2="486" y2="223" stroke-width="1.5"/>
    <line x1="440" y1="218" x2="440" y2="236" stroke-width="1.5"/>
    <line x1="409" y1="208" x2="394" y2="223" stroke-width="1.5"/>
    <line x1="385" y1="178" x2="366" y2="178" stroke-width="1.5"/>
    <line x1="409" y1="148" x2="394" y2="133" stroke-width="1.5"/>
  </g>

  <!-- Spotify logo (scaled 2.33x from 24x24) -->
  <g transform="translate(44,44) scale(2.33)" filter="url(#glow)">
    <path fill="#1DB954" d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"/>
  </g>

  <!-- "LUCID ROB ON" label -->
  <text x="44" y="144" font-family="'Courier New', Courier, monospace" font-size="11" fill="#1DB954" opacity="0.9" letter-spacing="5">LUCID ROB ON</text>

  <!-- Platform name -->
  <text x="40" y="204" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff" filter="url(#glow)">SPOTIFY</text>

  <!-- Bottom tag -->
  <text x="44" y="268" font-family="'Courier New', Courier, monospace" font-size="9" fill="#1DB954" opacity="0.55" letter-spacing="3">STREAM  ·  FOLLOW  ·  DISCOVER</text>
</svg>
