<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="sl" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" fill="#ffffff" opacity="0.018"/>
    </pattern>
    <filter id="glow-lg">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a20" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#sl)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ff006e" stroke-width="1.5" opacity="0.4"/>

  <!-- Corner notches -->
  <path d="M0,36 L36,0" stroke="#ff006e" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M1164,0 L1200,36" stroke="#ff006e" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M0,594 L36,630" stroke="#ff006e" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M1164,630 L1200,594" stroke="#ff006e" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Inner frame accent lines -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#ff006e" stroke-width="0.5" opacity="0.18"/>
  <line x1="0" y1="574" x2="1200" y2="574" stroke="#ff006e" stroke-width="0.5" opacity="0.18"/>

  <!-- Large illuminati pyramid (right side, background art) -->
  <g opacity="0.14" stroke="#ff006e" fill="#ff006e">
    <polygon points="900,60 1170,570 630,570" fill="none" stroke-width="3"/>
    <!-- Eye white -->
    <ellipse cx="900" cy="375" rx="110" ry="70"/>
    <!-- Iris -->
    <circle cx="900" cy="375" r="45" fill="#080810"/>
    <!-- Pupil -->
    <circle cx="900" cy="375" r="21"/>
    <!-- Inner pupil -->
    <circle cx="900" cy="375" r="8" fill="#080810"/>
    <!-- Rays (8 directions) -->
    <line x1="900" y1="295" x2="900" y2="258" stroke-width="2.5"/>
    <line x1="964" y1="315" x2="998" y2="280" stroke-width="2.5"/>
    <line x1="1012" y1="375" x2="1050" y2="375" stroke-width="2.5"/>
    <line x1="964" y1="435" x2="998" y2="470" stroke-width="2.5"/>
    <line x1="900" y1="455" x2="900" y2="492" stroke-width="2.5"/>
    <line x1="836" y1="435" x2="802" y2="470" stroke-width="2.5"/>
    <line x1="788" y1="375" x2="750" y2="375" stroke-width="2.5"/>
    <line x1="836" y1="315" x2="802" y2="280" stroke-width="2.5"/>
  </g>

  <!-- Secondary smaller pyramid (left accent) -->
  <g opacity="0.06" stroke="#00f0ff" fill="none">
    <polygon points="160,120 280,420 40,420" stroke-width="1.5"/>
    <ellipse cx="160" cy="295" rx="42" ry="27" fill="#00f0ff" fill-opacity="0.06"/>
    <circle cx="160" cy="295" r="10" fill="#00f0ff" fill-opacity="0.06"/>
  </g>

  <!-- Horizontal grid lines (subtle) -->
  <line x1="60" y1="200" x2="520" y2="200" stroke="#00f0ff" stroke-width="0.5" opacity="0.12"/>
  <line x1="60" y1="440" x2="520" y2="440" stroke="#00f0ff" stroke-width="0.5" opacity="0.12"/>

  <!-- Top label -->
  <text x="60" y="108" font-family="'Courier New', Courier, monospace" font-size="18" fill="#00f0ff" opacity="0.7" letter-spacing="8">// HISTORY WITHOUT THE BORING PARTS</text>

  <!-- Main domain name -->
  <text x="54" y="320" font-family="Arial Black, Impact, sans-serif" font-size="148" font-weight="900" fill="#ffffff" filter="url(#glow-lg)" letter-spacing="-2">LUCIDROB</text>

  <!-- .COM accent -->
  <text x="60" y="415" font-family="Arial Black, Impact, sans-serif" font-size="78" font-weight="900" fill="#ff006e" filter="url(#glow-md)" letter-spacing="4">.COM</text>

  <!-- Bottom tag line -->
  <text x="60" y="530" font-family="'Courier New', Courier, monospace" font-size="16" fill="#ffb400" opacity="0.75" letter-spacing="5">CONSPIRACIES  ...  BOOKS  ...  MUSIC  ...  SIGNAL FROM THE STATIC</text>

  <!-- Decorative dot grid (bottom right) -->
  <g opacity="0.1" fill="#00f0ff">
    <circle cx="1100" cy="560" r="2"/><circle cx="1120" cy="560" r="2"/><circle cx="1140" cy="560" r="2"/><circle cx="1160" cy="560" r="2"/>
    <circle cx="1100" cy="540" r="2"/><circle cx="1120" cy="540" r="2"/><circle cx="1140" cy="540" r="2"/><circle cx="1160" cy="540" r="2"/>
    <circle cx="1100" cy="520" r="2"/><circle cx="1120" cy="520" r="2"/><circle cx="1140" cy="520" r="2"/><circle cx="1160" cy="520" r="2"/>
    <circle cx="1100" cy="500" r="2"/><circle cx="1120" cy="500" r="2"/><circle cx="1140" cy="500" r="2"/><circle cx="1160" cy="500" r="2"/>
  </g>
</svg>
