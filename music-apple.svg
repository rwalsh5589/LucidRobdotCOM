<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <pattern id="sl" x="0" y="0" width="600" height="4" patternUnits="userSpaceOnUse">
      <rect width="600" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#080810"/>
  <rect width="600" height="300" fill="url(#sl)"/>

  <!-- Border -->
  <rect width="600" height="300" fill="none" stroke="#FC3C44" stroke-width="1.5" opacity="0.45"/>
  <!-- Corner notches -->
  <path d="M0,20 L20,0" stroke="#FC3C44" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M580,0 L600,20" stroke="#FC3C44" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M0,280 L20,300" stroke="#FC3C44" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M580,300 L600,280" stroke="#FC3C44" stroke-width="1.5" fill="none" opacity="0.85"/>

  <!-- ILLUMINATI PYRAMID (right side, semi-transparent) -->
  <g opacity="0.13" stroke="#FC3C44" fill="#FC3C44">
    <polygon points="440,22 625,278 255,278" fill="none" stroke-width="2.5"/>
    <ellipse cx="440" cy="178" rx="54" ry="34"/>
    <circle cx="440" cy="178" r="22" fill="#080810"/>
    <circle cx="440" cy="178" r="10" fill="#FC3C44"/>
    <circle cx="440" cy="178" r="4" fill="#080810"/>
    <!-- Rays -->
    <line x1="440" y1="138" x2="440" y2="120" stroke-width="1.5"/>
    <line x1="471" y1="148" x2="486" y2="133" stroke-width="1.5"/>
    <line x1="495" y1="178" x2="514" y2="178" stroke-width="1.5"/>
    <line x1="471" y1="208" x2="486" y2="223" stroke-width="1.5"/>
    <line x1="440" y1="218" x2="440" y2="236" stroke-width="1.5"/>
    <line x1="409" y1="208" x2="394" y2="223" stroke-width="1.5"/>
    <line x1="385" y1="178" x2="366" y2="178" stroke-width="1.5"/>
    <line x1="409" y1="148" x2="394" y2="133" stroke-width="1.5"/>
  </g>

  <!-- Apple Music logo: rounded rect + music note -->
  <g transform="translate(44,44)">
    <!-- App icon background -->
    <rect width="56" height="56" rx="13" fill="#FC3C44" filter="url(#glow)"/>
    <!-- Music note -->
    <path d="M38,14 L38,34 Q38,40 32,40 Q26,40 26,34 Q26,28 32,28 Q35,28 38,31 L38,20 L22,23 L22,42 Q22,48 16,48 Q10,48 10,42 Q10,36 16,36 Q19,36 22,39 L22,16 Z" fill="#ffffff"/>
  </g>

  <!-- "LUCID ROB ON" label -->
  <text x="44" y="144" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FC3C44" opacity="0.9" letter-spacing="5">LUCID ROB ON</text>

  <!-- Platform name -->
  <text x="40" y="204" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#ffffff" filter="url(#glow)">APPLE MUSIC</text>

  <!-- Bottom tag -->
  <text x="44" y="268" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FC3C44" opacity="0.55" letter-spacing="3">STREAM  ·  FOLLOW  ·  DISCOVER</text>
</svg>
