const socialIcons = {

  instagram: '<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>',
  twitter:   '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',

// ====================== BLOG SEARCH / TAGS / PAGINATION ======================
const POSTS_PER_PAGE = 10;

const postsList   = document.getElementById('postsList');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const filterBar   = document.getElementById('filterBar');
const pagination  = document.getElementById('pagination');

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getState() {
  const p = new URLSearchParams(window.location.search);
  return {
    q:    (p.get('q')   || '').trim(),
    tag:  (p.get('tag') || '').trim(),
    page: Math.max(1, parseInt(p.get('page'), 10) || 1)
  };
}

function setState(partial, opts = {}) {
  const cur  = getState();
  const next = { ...cur, ...partial };
  if ('q' in partial || 'tag' in partial) next.page = 1;
  const p = new URLSearchParams();
  if (next.q)         p.set('q', next.q);
  if (next.tag)       p.set('tag', next.tag);
  if (next.page > 1)  p.set('page', next.page);
  const qs  = p.toString();
  const url = qs ? `${window.location.pathname}?${qs}` : window.location.pathname;
  if (opts.replace) history.replaceState({}, '', url);
  else              history.pushState({}, '', url);
  render();
}

function filterPosts({ q, tag }) {
  let res = POSTS;
  if (tag) res = res.filter(p => Array.isArray(p.tags) && p.tags.includes(tag));
  if (q) {
    const Q = q.toLowerCase();
    res = res.filter(p => {
      const haystack = `${p.title} ${p.excerpt} ${(p.tags||[]).join(' ')} ${p.body}`.toLowerCase();
      return haystack.includes(Q);
    });
  }
  return res;
}

function render() {
  const { q, tag, page } = getState();

  if (searchInput.value !== q) searchInput.value = q;
  searchClear.hidden = !q;

  document.querySelectorAll('.tag-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.tag === tag && tag !== '');
  });

  const filtered    = filterPosts({ q, tag });
  const totalPages  = Math.max(1, Math.ceil(filtered.length / POSTS_PER_PAGE));
  const safePage    = Math.min(page, totalPages);
  const startIdx    = (safePage - 1) * POSTS_PER_PAGE;
  const slice       = filtered.slice(startIdx, startIdx + POSTS_PER_PAGE);

  // Active filter chips
  const activeBits = [];
  if (q)   activeBits.push(`<span class="active-filter">search: <em>${esc(q)}</em><button class="active-clear" data-clear="q" aria-label="Clear search">×</button></span>`);
  if (tag) activeBits.push(`<span class="active-filter">tag: <em>${esc(tag)}</em><button class="active-clear" data-clear="tag" aria-label="Clear tag">×</button></span>`);
  const matchTotal = filtered.length;
  const countText = (q || tag)
    ? `${matchTotal} ${matchTotal === 1 ? 'match' : 'matches'}`
    : `${POSTS.length} ${POSTS.length === 1 ? 'post' : 'posts'}`;
  filterBar.innerHTML = `<span class="result-count mono">${countText}</span>` + activeBits.join('') +
    ((q || tag) ? `<button class="active-clear-all" id="clearAll">clear all</button>` : '');

  // Posts
  if (slice.length === 0) {
    postsList.innerHTML = `<div class="empty-state">
      <p>No posts match.</p>
      <button class="btn primary" id="emptyClear">Clear filters</button>
    </div>`;
  } else {
    postsList.innerHTML = slice.map(p => {
      const dt = new Date(p.date).toISOString().slice(0,10).replace(/-/g, '.');
      const href = `/blog/${p.slug}`;
      return `<article class="post" data-href="${href}">
        <div class="post-date">${dt}</div>
        <div class="post-body">
          <h3><a class="post-title-link" href="${href}">${esc(p.title)}</a></h3>
          <p class="excerpt">${esc(p.excerpt)}</p>
        </div>
        <div class="arrow">→</div>
      </article>`;
    }).join('');
  }

  // Pagination
  if (totalPages > 1) {
    let pages = '';
    for (let i = 1; i <= totalPages; i++) {
      pages += `<button class="page-btn page-num ${i === safePage ? 'active' : ''}" data-page="${i}" aria-label="Go to page ${i}">${i}</button>`;
    }
    pagination.innerHTML = `
      <button class="page-btn page-prev" data-page="${safePage - 1}" ${safePage === 1 ? 'disabled' : ''} aria-label="Previous page">← prev</button>
      <div class="page-numbers">${pages}</div>
      <button class="page-btn page-next" data-page="${safePage + 1}" ${safePage === totalPages ? 'disabled' : ''} aria-label="Next page">next →</button>
    `;
  } else {
    pagination.innerHTML = '';
  }
}

// Search input (debounced)
let searchTimer;
searchInput.addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const v = e.target.value.trim();
  searchClear.hidden = !v;
  searchTimer = setTimeout(() => setState({ q: v }), 180);
});

// Search clear button
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  setState({ q: '' });
});

// Click delegation: tag chips, page buttons, clear buttons, post cards
document.body.addEventListener('click', (e) => {
  // Tag chip → filter (intercept link, use pushState)
  const tagChip = e.target.closest('.tag-chip');
  if (tagChip && tagChip.dataset.tag) {
    e.preventDefault();
    const cur = getState();
    const newTag = cur.tag === tagChip.dataset.tag ? '' : tagChip.dataset.tag;
    setState({ tag: newTag });
    window.scrollTo({ top: document.querySelector('.section-header').offsetTop - 40, behavior: 'smooth' });
    return;
  }

  // Pagination
  const pageBtn = e.target.closest('.page-btn');
  if (pageBtn && pageBtn.dataset.page && !pageBtn.disabled) {
    e.preventDefault();
    setState({ page: parseInt(pageBtn.dataset.page, 10) });
    window.scrollTo({ top: document.querySelector('.section-header').offsetTop - 40, behavior: 'smooth' });
    return;
  }

  // Active filter clear (single)
  const clearBtn = e.target.closest('.active-clear');
  if (clearBtn) {
    e.preventDefault();
    setState({ [clearBtn.dataset.clear]: '' });
    return;
  }

  // Clear all
  if (e.target.id === 'clearAll' || e.target.id === 'emptyClear') {
    setState({ q: '', tag: '' });
    return;
  }

  // Post card → navigate (unless click was on a link inside it)
  const postEl = e.target.closest('.post');
  if (postEl && postEl.dataset.href && !e.target.closest('a')) {
    window.location.href = postEl.dataset.href;
  }
});

window.addEventListener('popstate', render);

render();
</script>
